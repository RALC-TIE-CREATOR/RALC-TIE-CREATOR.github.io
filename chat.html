<html lang="es">
<head>

<title>TIE · H-14 · AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --gold:#FFD700;--blue:#5BC8F5;--green:#44FF88;--red:#FF4455;--purple:#a855f7;
  --bg:#000001;--bg2:rgba(5,5,15,0.9);--bg3:rgba(10,10,25,0.4);
  --text:#ffffff;--dim:#a0a0b0;--border:rgba(91,200,245,0.2);
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

#space-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}

nav{
  background:rgba(0,0,2,0.8);backdrop-filter:blur(10px);
  padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);z-index:100;
}
.nav-logo{font-family:var(--mono);color:var(--gold);text-decoration:none;font-weight:700;letter-spacing:2px;font-size:0.9rem;}
.status-bar{font-family:var(--mono);font-size:0.7rem;letter-spacing:1px;color:var(--dim);}
.status-bar.online{color:var(--green);}

.main-container{flex:1;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:10;padding:1rem;}

/* PANTALLA DE KEY */
.setup-overlay{
  position:absolute;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;text-align:center;
}
.key-box{
  background:var(--bg2);border:1px solid var(--gold);padding:2.5rem;border-radius:4px;width:100%;max-width:500px;
  box-shadow:0 0 40px rgba(255,215,0,0.1);
}
input[type="password"]{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
  padding:1rem;color:white;font-family:var(--mono);margin:1.5rem 0;outline:none;
}
.btn-connect{
  background:var(--gold);color:black;border:none;padding:1rem 2rem;cursor:pointer;
  font-family:var(--mono);font-weight:700;width:100%;transition:0.3s;
}

/* ÁREA DE CHAT */
.chat-area{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:1rem;}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);}

.msg{display:flex;gap:1rem;max-width:85%;animation:fadeIn 0.3s ease-out forwards;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.bot{align-self:flex-start;}

.avatar{
  width:32px;height:32px;border-radius:2px;display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;font-weight:700;font-family:var(--mono);flex-shrink:0;
}
.msg.user .avatar{background:var(--blue);color:black;}
.msg.bot .avatar{background:var(--purple);color:white;}

.bubble{
  padding:1rem 1.2rem;border-radius:4px;font-size:0.95rem;line-height:1.6;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
}
.msg.user .bubble{background:rgba(91,200,245,0.05);border-color:rgba(91,200,245,0.2);}
.msg.bot .bubble{background:rgba(168,85,247,0.05);border-color:rgba(168,85,247,0.2);}

/* EDITOR */
.input-wrap{
  background:var(--bg2);border:1px solid var(--border);padding:0.5rem;
  display:flex;gap:0.5rem;align-items:flex-end;border-radius:4px;margin-bottom:1rem;
}
textarea{
  flex:1;background:transparent;border:none;outline:none;color:white;
  font-family:var(--sans);font-size:1rem;padding:0.8rem;resize:none;max-height:200px;
}
.btn-send{
  background:var(--gold);border:none;width:40px;height:40px;display:flex;
  align-items:center;justify-content:center;cursor:pointer;border-radius:2px;flex-shrink:0;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.loading-dots span{display:inline-block;width:6px;height:6px;background:var(--purple);border-radius:50%;margin:0 2px;animation:dot 1.4s infinite;}
@keyframes dot{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
</style>
</head>

<div id="space-bg"></div>

<nav>
  <a href="index.html" class="nav-logo">TIE_CORE // H-14</a>
  <div class="status-bar" id="status-bar">MODO_ESPERA</div>
</nav>

<div class="setup-overlay" id="setup">

    <p style="font-size:0.8rem; color:var(--dim);">Introduce tu Google Gemini API Key para habilitar el motor de inferencia TIE.</p>
    <input type="password" id="api-key-input" placeholder="PASTE_KEY_HERE...">
    <button class="btn-connect" onclick="saveKey()">INICIALIZAR NÚCLEO_</button>

</div>

      <h3 style="color:var(--gold); font-family:var(--mono); margin-bottom:1rem;">NODO_H14 ACTIVADO</h3>
      <p style="color:var(--dim); font-size:0.9rem;">Consultoría técnica sobre Infraestructura Espacial, Curvas de Rotación y Sincronía del Motor Absoluto.</p>

  </div>

  <div class="input-wrap">

    </button>
  </div>
</div>

// --- MOTOR DE FONDO (THREE.JS) ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('space-bg').appendChild(renderer.domElement);

const points = [];
for(let i=0; i<1500; i++){
  points.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
}
const starGeo = new THREE.BufferGeometry().setFromPoints(points);
const starMat = new THREE.PointsMaterial({color:0x5BC8F5, size:0.1, transparent:true, opacity:0.5});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);
camera.position.z = 30;

function animate(){
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0003;
  renderer.render(scene, camera);
}
animate();

// --- LÓGICA DE CHAT ---
let apiKey = sessionStorage.getItem('tie_chat_key');
let history = [];

if(apiKey) document.getElementById('setup').style.display = 'none';

function saveKey(){
  const val = document.getElementById('api-key-input').value.trim();
  if(val){
    apiKey = val;
    sessionStorage.setItem('tie_chat_key', val);
    document.getElementById('setup').style.display = 'none';
    setStatus('NÚCLEO_ACTIVO', 'online');
  }
}

async function send(){
  const input = document.getElementById('ti');
  const text = input.value.trim();
  if(!text || !apiKey) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('welcome').style.display = 'none';

  addMsg('user', text);
  const botMsgDiv = addMsg('bot', '', true);

  try {
    const body = {
      contents: [...history, { role: 'user', parts: [{ text: text }] }],

    };

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    const reply = data.candidates[0].content.parts[0].text;
    
    botMsgDiv.querySelector('.bubble').innerHTML = renderMd(reply);
    renderKatex(botMsgDiv.querySelector('.bubble'));
    
    history.push({role:'user', parts:[{text:text}]});
    history.push({role:'model', parts:[{text:reply}]});
    setStatus('RESPUESTA_PROCESADA', 'online');

  } catch (e) {
    botMsgDiv.querySelector('.bubble').textContent = "ERROR_DE_SINCRONÍA: Verifica tu API Key.";
    console.error(e);
  }
}

  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = `msg ${role==='user'?'user':'bot'}`;
  div.innerHTML = `
    <div class="avatar">${role==='user'?'TÚ':'TIE'}</div>

  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
