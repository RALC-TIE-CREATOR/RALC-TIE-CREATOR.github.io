<style>
:root{
  --gold:#FFD700;--lime:#aaff00;--red:#FF4455;--orange:#FF8C42;--blue:#5BC8F5;
  --bg:#000001;--bg2:rgba(5,5,15,0.92);--bg3:rgba(8,14,25,0.75);
  --text:#fff;--dim:#9090a8;--border:rgba(170,255,0,0.13);
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}
#bg-canvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:120vw;height:120vh;min-width:1200px;min-height:1200px;pointer-events:none;z-index:0;opacity:0.2;}

nav{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;background:rgba(0,0,1,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-logo{font-family:var(--mono);font-size:.85rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:2px;}
.nav-center{display:flex;gap:.5rem;}
.lang-btn{font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:2px;padding:.25rem .6rem;border-radius:4px;cursor:pointer;border:none;transition:all .2s;}
.lang-btn.active{color:#000;background:var(--gold);}
.lang-btn.inactive{color:var(--dim);border:1px solid var(--border);background:transparent;}
.lang-btn.inactive:hover{color:var(--gold);border-color:var(--gold);}
.nav-back{font-family:var(--mono);font-size:.75rem;color:var(--dim);text-decoration:none;letter-spacing:1px;transition:color .2s;}
.nav-back:hover{color:var(--lime);}

.strip{position:relative;z-index:10;background:rgba(0,0,1,0.8);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:.4rem;}
.s-tag{font-family:var(--mono);font-size:.6rem;color:var(--lime);letter-spacing:3px;}
.s-title{font-family:var(--sans);font-size:.95rem;font-weight:800;letter-spacing:-.5px;}
.s-title span{color:var(--lime);}
.s-badge{font-family:var(--mono);font-size:.58rem;color:var(--orange);background:rgba(255,140,66,.08);border:1px solid rgba(255,140,66,.25);border-radius:4px;padding:.18rem .55rem;letter-spacing:1px;}

/* LAYOUT */
#main{position:relative;z-index:10;flex:1;display:flex;overflow:hidden;min-height:0;}

/* LEFT: equation catalog */
#catalog-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
#cat-search-wrap{padding:.7rem .8rem;border-bottom:1px solid var(--border);flex-shrink:0;}
#cat-search{width:100%;background:rgba(10,14,25,.8);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:.7rem;padding:.5rem .75rem;outline:none;transition:border-color .2s;}
#cat-search:focus{border-color:var(--lime);}
#cat-search::placeholder{color:var(--dim);}
#cat-filters{display:flex;gap:.3rem;padding:.5rem .8rem;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
.cat-filter{font-family:var(--mono);font-size:.58rem;letter-spacing:1px;padding:.2rem .5rem;border-radius:12px;cursor:pointer;border:1px solid var(--border);color:var(--dim);background:transparent;transition:all .2s;}
.cat-filter.active{background:rgba(170,255,0,.12);border-color:var(--lime);color:var(--lime);}
.cat-filter:hover:not(.active){color:var(--text);}
#eq-list{flex:1;overflow-y:auto;padding:.5rem .5rem;display:flex;flex-direction:column;gap:.3rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

.eq-item{background:var(--bg3);border:1px solid transparent;border-radius:8px;padding:.55rem .7rem;cursor:pointer;transition:all .18s;}
.eq-item:hover{border-color:rgba(170,255,0,.2);background:rgba(170,255,0,.04);}
.eq-item.selected{border-color:var(--lime);background:rgba(170,255,0,.08);}
.eq-item-name{font-family:var(--sans);font-size:.72rem;font-weight:700;color:var(--text);margin-bottom:.25rem;}
.eq-item-cat{font-family:var(--mono);font-size:.55rem;color:var(--dim);letter-spacing:1px;margin-bottom:.3rem;}
.eq-item-preview{overflow:hidden;}
.eq-item-preview .katex{font-size:.75em;}

/* CENTER: preview + code */
#preview-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

#preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.5rem;min-height:0;}
.preview-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:2rem 2.5rem;width:100%;max-width:560px;text-align:center;}
.preview-card .katex-display{margin:0;}
.preview-card .katex{font-size:1.6em;}
.preview-name{font-family:var(--sans);font-size:1rem;font-weight:800;margin-bottom:.35rem;color:var(--gold);}
.preview-desc{font-family:var(--mono);font-size:.65rem;color:var(--dim);line-height:1.7;max-width:460px;margin:0 auto .25rem;}
.preview-context{font-family:var(--mono);font-size:.62rem;color:rgba(170,255,0,.7);margin-top:.3rem;}

/* TABS */
.code-tabs{display:flex;border-top:1px solid var(--border);flex-shrink:0;}
.code-tab{flex:1;font-family:var(--mono);font-size:.62rem;letter-spacing:1px;padding:.5rem;background:transparent;border:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.code-tab.active{color:var(--lime);border-bottom-color:var(--lime);}
.code-tab:hover:not(.active){color:var(--text);}

/* CODE BOX */
#code-area{flex-shrink:0;padding:.75rem;background:rgba(0,0,1,.6);border-top:1px solid var(--border);}
.code-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.code-label{font-family:var(--mono);font-size:.58rem;color:var(--dim);letter-spacing:2px;}
.code-actions{display:flex;gap:.4rem;}
.btn-copy{background:rgba(170,255,0,.08);border:1px solid rgba(170,255,0,.25);border-radius:6px;color:var(--lime);font-family:var(--mono);font-size:.6rem;letter-spacing:1px;padding:.25rem .65rem;cursor:pointer;transition:all .2s;}
.btn-copy:hover{background:rgba(170,255,0,.18);}
.btn-copy.copied{color:#000;background:var(--lime);border-color:var(--lime);}
#code-box{background:rgba(0,0,0,.7);border:1px solid rgba(170,255,0,.1);border-radius:8px;padding:.65rem .85rem;font-family:var(--mono);font-size:.72rem;color:rgba(170,255,0,.9);line-height:1.6;word-break:break-all;max-height:90px;overflow-y:auto;white-space:pre-wrap;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* RIGHT: custom + export */
#right-col{width:250px;flex-shrink:0;display:flex;flex-direction:column;gap:.6rem;padding:.8rem;overflow-y:auto;border-left:1px solid var(--border);scrollbar-width:none;}
#right-col::-webkit-scrollbar{display:none;}

.r-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.75rem;}
.r-title{font-family:var(--mono);font-size:.58rem;color:var(--lime);letter-spacing:3px;margin-bottom:.6rem;}

/* CUSTOM EDITOR */
#custom-input{width:100%;background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:7px;color:var(--lime);font-family:var(--mono);font-size:.7rem;padding:.5rem .65rem;resize:none;height:70px;outline:none;transition:border-color .2s;scrollbar-width:none;}
#custom-input:focus{border-color:var(--lime);}
#custom-preview{background:rgba(0,0,0,.4);border:1px solid rgba(170,255,0,.08);border-radius:7px;padding:.6rem;min-height:42px;text-align:center;margin:.4rem 0;}
.btn-insert{width:100%;background:rgba(170,255,0,.08);border:1px solid rgba(170,255,0,.2);border-radius:6px;color:var(--lime);font-family:var(--mono);font-size:.62rem;letter-spacing:1px;padding:.4rem;cursor:pointer;transition:all .2s;margin-top:.3rem;}
.btn-insert:hover{background:rgba(170,255,0,.18);}

/* EXPORT BLOCK */
.export-btns{display:flex;flex-direction:column;gap:.35rem;}
.export-btn{background:rgba(255,140,66,.06);border:1px solid rgba(255,140,66,.2);border-radius:6px;color:var(--orange);font-family:var(--mono);font-size:.62rem;letter-spacing:1px;padding:.4rem .6rem;cursor:pointer;transition:all .2s;text-align:left;}
.export-btn:hover{background:rgba(255,140,66,.15);}

/* CONSTANTS CHEATSHEET */
.const-grid{display:flex;flex-direction:column;gap:.3rem;}
.const-row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:.25rem;}
.const-row:last-child{border:none;padding:0;}
.const-key{font-family:var(--mono);font-size:.6rem;color:var(--dim);}
.const-val{font-family:var(--mono);font-size:.6rem;color:var(--gold);cursor:pointer;transition:color .2s;}
.const-val:hover{color:var(--lime);}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:rgba(170,255,0,.15);border:1px solid rgba(170,255,0,.4);border-radius:8px;padding:.45rem 1rem;font-family:var(--mono);font-size:.68rem;color:var(--lime);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

@media(max-width:900px){
  #catalog-col{width:200px;}
  #right-col{display:none;}
}
@media(max-width:600px){
  #catalog-col{display:none;}
  #preview-col{flex:1;}
}
</style>

<!-- BG -->
<script>
(function(){
  const cv=document.getElementById('bg-canvas');
  const sc=new THREE.Scene(),cam=new THREE.PerspectiveCamera(60,1,.1,1000);
  const ren=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  function rs(){ren.setSize(cv.clientWidth,cv.clientHeight);cam.aspect=cv.clientWidth/cv.clientHeight;cam.updateProjectionMatrix();}
  rs();window.addEventListener('resize',rs);
  cam.position.set(0,3,6);cam.lookAt(0,0,0);
  const n=30000,geo=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3),col=new Float32Array(n*3);
  const c1=new THREE.Color('#aaff00'),c2=new THREE.Color('#0a1400');
  for(let i=0;i<n;i++){
    const r=Math.random()*4,b=(i%5)/5*Math.PI*2+r*.9;
    pos[i*3]=Math.cos(b)*r+(Math.random()-.5)*.3*r;
    pos[i*3+1]=(Math.random()-.5)*.12*r;
    pos[i*3+2]=Math.sin(b)*r+(Math.random()-.5)*.3*r;
    const m=new THREE.Color().lerpColors(c1,c2,r/4);
    col[i*3]=m.r;col[i*3+1]=m.g;col[i*3+2]=m.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  sc.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.007,sizeAttenuation:true,depthWrite:false,blending:THREE.AdditiveBlending,vertexColors:true})));
  (function loop(){requestAnimationFrame(loop);sc.rotation.y+=.0004;ren.render(sc,cam);})();
})();
</script>

const CATS = ['todos','fundamental','rotacion','agujeros','lensing','gw','cosmologia','gps'];
const CAT_LABELS_ES = {todos:'TODOS',fundamental:'FUNDAMENTAL',rotacion:'ROTACIÓN',agujeros:'AG. NEGROS',lensing:'LENSING',gw:'ONDAS GW',cosmologia:'COSMOLOGÍA',gps:'GPS/RELOJES'};
const CAT_LABELS_EN = {todos:'ALL',fundamental:'FUNDAMENTAL',rotacion:'ROTATION',agujeros:'BLACK HOLES',lensing:'LENSING',gw:'GW WAVES',cosmologia:'COSMOLOGY',gps:'GPS/CLOCKS'};

const CONSTANTS = [
  {key:'a₀',      val:'1.082×10⁻¹⁰ m/s²', latex:'a_0 = 1.082\\times10^{-10}\\,\\text{m/s}^2'},
  {key:'H₀',      val:'70 km/s/Mpc',        latex:'H_0 = 70\\,\\text{km/s/Mpc}'},
  {key:'Λ_TIE',   val:'1.145×10⁻⁵² m⁻²',   latex:'\\Lambda = 1.145\\times10^{-52}\\,\\text{m}^{-2}'},
  {key:'Mc',      val:'1.06×10²³ M☉',       latex:'M_c = 1.06\\times10^{23}\\,M_\\odot'},
  {key:'f_LISA',  val:'2.4 mHz',             latex:'f_{\\text{LISA}} = 2.4\\,\\text{mHz}'},
  {key:'rₕ M87*', val:'7.76×10¹⁶ km',       latex:'r_h(\\text{M87*}) = 7.76\\times10^{16}\\,\\text{km}'},
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let lang      = 'es';
let activeCat = 'todos';
let searchQ   = '';
let selEq     = null;
let tabMode   = 'inline';
let codeLines = [];

// ══════════════════════════════════════════
// RENDER CATALOG
// ══════════════════════════════════════════
function renderFilters(){
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-filter' + (c===activeCat?' active':'');
    btn.textContent = lang==='es' ? CAT_LABELS_ES[c] : CAT_LABELS_EN[c];
    btn.onclick = () => { activeCat=c; renderFilters(); renderList(); };
    wrap.appendChild(btn);
  });
}

function renderList(){
  const list = document.getElementById('eq-list');
  list.innerHTML = '';
  const q = searchQ.toLowerCase();
  EQUATIONS.filter(eq => {
    const matchCat  = activeCat==='todos' || eq.cat===activeCat;
    const nameKey   = lang==='es' ? eq.nameES : eq.nameEN;
    const matchSrch = !q || nameKey.toLowerCase().includes(q) || eq.latex.toLowerCase().includes(q) || eq.cat.includes(q);
    return matchCat && matchSrch;
  }).forEach(eq => {
    const div = document.createElement('div');
    div.className = 'eq-item' + (selEq===eq.id?' selected':'');
    div.onclick = () => selectEq(eq.id);
    const catLbl = lang==='es' ? CAT_LABELS_ES[eq.cat] : CAT_LABELS_EN[eq.cat];
    div.innerHTML = `
      <div class="eq-item-name">${lang==='es'?eq.nameES:eq.nameEN}</div>
      <div class="eq-item-cat">${catLbl}</div>
      <div class="eq-item-preview" id="prev-mini-${eq.id}"></div>`;
    list.appendChild(div);
    // Render mini KaTeX
    try{
      katex.render(eq.latex, div.querySelector('.eq-item-preview'), {throwOnError:false,displayMode:false});
    }catch(e){}
  });
}

function filterEqs(){
  searchQ = document.getElementById('cat-search').value;
  renderList();
}

// ══════════════════════════════════════════
// SELECT EQUATION
// ══════════════════════════════════════════
function selectEq(id){
  selEq = id;
  const eq = EQUATIONS.find(e=>e.id===id);
  if(!eq) return;
  renderList();

  document.getElementById('prev-name').textContent = lang==='es' ? eq.nameES : eq.nameEN;
  document.getElementById('prev-desc').textContent = lang==='es' ? eq.descES : eq.descEN;
  document.getElementById('prev-ctx').textContent  = lang==='es' ? eq.ctxES  : eq.ctxEN;

  const render = document.getElementById('prev-render');
  try{
    katex.render(eq.latex, render, {throwOnError:false, displayMode:true});
  }catch(e){ render.textContent = eq.latex; }

  updateCodeBox(eq);
}

// ══════════════════════════════════════════
// CODE BOX
// ══════════════════════════════════════════
function setTab(mode){
  tabMode = mode;
  ['inline','display','equation','align'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===mode);
  });
  const eq = EQUATIONS.find(e=>e.id===selEq);
  if(eq) updateCodeBox(eq);
}

function updateCodeBox(eq){
  let code = '';
  if(tabMode==='inline'){
    code = `\\(${eq.latex}\\)`;
  } else if(tabMode==='display'){
    code = `\\[${eq.latex}\\]`;
  } else if(tabMode==='equation'){
    const label = eq.id.replace('-','_');
    code = `\\begin{equation}\n  ${eq.latex}\n  \\label{eq:${label}}\n\\end{equation}`;
  } else {
    code = `\\begin{align}\n  ${eq.latex}\n\\end{align}`;
  }
  document.getElementById('code-box').textContent = code;
}

function copyCode(){
  const text = document.getElementById('code-box').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('btn-copy');
    btn.classList.add('copied');
    btn.querySelector('span').textContent = lang==='es'?'¡COPIADO!':'COPIED!';
    setTimeout(()=>{btn.classList.remove('copied');btn.querySelector('span').textContent=lang==='es'?'COPIAR':'COPY';},1500);
    showToast(lang==='es'?'LaTeX copiado al portapapeles':'LaTeX copied to clipboard');
  });
}

function copyAll(){
  const eqs = EQUATIONS.filter(eq => activeCat==='todos' || eq.cat===activeCat);
  const lines = eqs.map(eq=>{
    const nm = lang==='es'?eq.nameES:eq.nameEN;
    return `% ${nm}\n\\[${eq.latex}\\]`;
  }).join('\n\n');
  navigator.clipboard.writeText(lines).then(()=>{
    showToast(lang==='es'?`${eqs.length} ecuaciones copiadas`:`${eqs.length} equations copied`);
  });
}

// ══════════════════════════════════════════
// CUSTOM EDITOR
// ══════════════════════════════════════════
function previewCustom(){
  const val = document.getElementById('custom-input').value.trim();
  const prev = document.getElementById('custom-preview');
  if(!val){ prev.innerHTML=''; return; }
  try{
    katex.render(val, prev, {throwOnError:false, displayMode:true});
  }catch(e){ prev.textContent=val; }
}

function insertCustom(){
  const val = document.getElementById('custom-input').value.trim();
  if(!val) return;
  const box = document.getElementById('code-box');
  const curr = box.textContent==='— Selecciona una ecuación —' ? '' : box.textContent;
  box.textContent = curr + (curr?'\n\n':'') + `\\[${val}\\]`;
  showToast(lang==='es'?'Ecuación insertada':'Equation inserted');
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportTex(){
  const eqs = activeCat==='todos' ? EQUATIONS : EQUATIONS.filter(e=>e.cat===activeCat);
  const lines = [
    '% TIE - Teoría de la Infraestructura Espacial',
    '% R@LC · Rubén Lecona · México 2026',
    '% Generado por el Laboratorio TIE H-15',
    '',
    '\\documentclass{article}',
    '\\usepackage{amsmath,amssymb}',
    '',
    '\\begin{document}',
    '',
    ...eqs.map(eq=>{
      const nm = lang==='es'?eq.nameES:eq.nameEN;
      const ds = lang==='es'?eq.descES:eq.descEN;
      return `% ${nm}\n% ${ds}\n\\begin{equation}\n  ${eq.latex}\n  \\label{eq:${eq.id}}\n\\end{equation}\n`;
    }),
    '\\end{document}',
  ].join('\n');
  download('tie-equations.tex', lines, 'text/plain');
  showToast(lang==='es'?'Archivo .tex descargado':'.tex file downloaded');
}

function exportMd(){
  const eqs = activeCat==='todos' ? EQUATIONS : EQUATIONS.filter(e=>e.cat===activeCat);
  const lines = [
    '# TIE — Ecuaciones LaTeX',
    '**Teoría de la Infraestructura Espacial · R@LC · 2026**',
    '',
    ...eqs.map(eq=>{
      const nm = lang==='es'?eq.nameES:eq.nameEN;
      const ds = lang==='es'?eq.descES:eq.descEN;
      return `## ${nm}\n\n${ds}\n\n$$${eq.latex}$$\n`;
    }),
  ].join('\n');
  download('tie-equations.md', lines, 'text/markdown');
  showToast(lang==='es'?'Archivo .md descargado':'.md file downloaded');
}

function download(filename, text, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type}));
  a.download = filename; a.click();
}

// ══════════════════════════════════════════
// CONSTANTS PANEL
// ══════════════════════════════════════════
function renderConstants(){
  const grid = document.getElementById('const-grid');
  grid.innerHTML = '';
  CONSTANTS.forEach(c=>{
    const row = document.createElement('div');
    row.className = 'const-row';
    row.innerHTML = `<span class="const-key">${c.key}</span><span class="const-val" title="click para copiar LaTeX" onclick="copyConstant('${c.latex.replace(/'/g,'&#39;')}')">${c.val}</span>`;
    grid.appendChild(row);
  });
}

function copyConstant(latex){
  navigator.clipboard.writeText(`\\(${latex}\\)`).then(()=>{
    showToast(lang==='es'?'Constante copiada':'Constant copied');
  });
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastT = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if(toastT) clearTimeout(toastT);
  toastT = setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════
// LANG
// ══════════════════════════════════════════
function setLang(l){
  lang = l;
  document.getElementById('btn-es').className='lang-btn '+(l==='es'?'active':'inactive');
  document.getElementById('btn-en').className='lang-btn '+(l==='en'?'active':'inactive');
  const lb=document.getElementById('lnk-back');
  lb.textContent = l==='es'?'← LABORATORIO':'← LABORATORY';
  lb.href = l==='es'?'labs.html':'labs-en.html';

  document.getElementById('strip-badge').textContent = 'TIE v11.8 · KATEX';
  document.getElementById('cat-search').placeholder = l==='es'?'Buscar ecuación...':'Search equation...';
  document.getElementById('r-custom-title').textContent = l==='es'?'ECUACIÓN CUSTOM':'CUSTOM EQUATION';
  document.getElementById('r-export-title').textContent = l==='es'?'EXPORTAR':'EXPORT';
  document.getElementById('r-const-title').textContent  = l==='es'?'CONSTANTES TIE':'TIE CONSTANTS';

  document.getElementById('btn-export-copy').textContent= l==='es'?'📋 COPIAR SELECCIÓN':'📋 COPY SELECTION';
  document.getElementById('btn-copy').querySelector('span').textContent    = l==='es'?'COPIAR':'COPY';

  document.getElementById('custom-input').placeholder = l==='es'?'\\frac{a_0}{2\\pi} = \\frac{cH_0}{4\\pi^2}':'\\frac{v_{flat}^4}{G} = M \\cdot a_0';
  renderFilters();
  renderList();
  renderConstants();
  if(selEq) selectEq(selEq);
}
