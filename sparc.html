<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador SPARC — TIE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
:root {
  --gold:   #FFD700;
  --blue:   #5BC8F5;
  --green:  #44FF88;
  --red:    #FF4455;
  --bg:     #06060f;
  --bg2:    #0d0d1a;
  --bg3:    #111122;
  --text:   #e8e8f0;
  --dim:    #7777aa;
  --border: #1e1e3a;
  --mono:   'Space Mono', monospace;
  --sans:   'Syne', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg); z-index:10; }
.logo { font-weight:800; font-size:1.2rem; letter-spacing:-0.03em; color:var(--text); text-decoration:none; }
.logo span { color:var(--gold); }

/* MAIN LAYOUT */
main { flex:1; display:grid; grid-template-columns: 300px 1fr; overflow:hidden; }

/* SIDEBAR */
.sidebar { background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; padding:1rem; }
.sidebar-title { font-family:var(--mono); font-size:0.7rem; color:var(--dim); text-transform:uppercase; margin-bottom:1rem; letter-spacing:0.1em; }
.galaxy-list { list-style:none; }
.galaxy-item { padding:0.6rem 0.8rem; border-radius:4px; cursor:pointer; font-size:0.85rem; transition:0.2s; border:1px solid transparent; margin-bottom:0.3rem; color:var(--dim); }
.galaxy-item:hover { background:var(--bg3); color:var(--text); }
.galaxy-item.active { background:rgba(255,215,0,0.1); border-color:var(--gold); color:var(--gold); font-weight:700; }

/* CONTENT */
.content { overflow-y:auto; padding:2rem; position:relative; }
.detail-header { margin-bottom:2rem; }
.detail-name { font-size:3rem; font-weight:800; color:var(--text); line-height:1; margin-bottom:0.5rem; }
.detail-type { font-family:var(--mono); font-size:0.8rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; }

.detail-grid { display:grid; grid-template-columns: 1fr 380px; gap:2rem; }

/* METRICS */
.metrics { display:grid; grid-template-columns: repeat(2, 1fr); gap:1rem; margin-bottom:1rem; }
.metric { background:var(--bg2); border:1px solid var(--border); padding:1.2rem; border-radius:8px; display:flex; flex-direction:column; justify-content:center; }
.m-label { font-family:var(--mono); font-size:0.65rem; color:var(--dim); text-transform:uppercase; margin-bottom:0.4rem; }
.m-value { font-size:1.5rem; font-weight:700; color:var(--text); font-family:var(--sans); }
.m-unit { font-size:0.7rem; color:var(--dim); margin-left:0.2rem; }

/* LINK LLAMADA AL MODULO H-02.1 */
.fix-link { 
  display:inline-block; margin-top:1rem; font-family:var(--mono); font-size:0.65rem; color:var(--gold); 
  text-decoration:none; border:1px solid var(--gold); padding:8px 12px; border-radius:4px; transition:0.3s;
  text-align:center;
}
.fix-link:hover { background:rgba(255,215,0,0.1); }

/* PLOT */
#sparc-plot { width:100%; height:450px; background:var(--bg2); border-radius:12px; border:1px solid var(--border); }

/* SHARE */
.share-box { margin-top:2rem; display:flex; gap:0.5rem; }
.share-input { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--dim); font-family:var(--mono); font-size:0.7rem; padding:0.8rem; border-radius:4px; }
.btn-copy { background:var(--gold); color:black; border:none; padding:0 1.2rem; border-radius:4px; font-weight:700; font-size:0.7rem; cursor:pointer; font-family:var(--mono); }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:var(--dim); }
</style>
</head>
<body>

<header>

<main>

        <div class="panel" style="background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:1.2rem;">
          <div style="font-family:var(--mono); font-size:0.7rem; color:var(--gold); margin-bottom:1rem; text-transform:uppercase;">Datos Bariónicos</div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div style="font-size:0.7rem; color:var(--dim);">Distancia: <b id="d-dist" style="color:var(--text);">---</b></div>
            <div style="font-size:0.7rem; color:var(--dim);">Masa Disco: <b id="d-mdisk" style="color:var(--text);">---</b></div>
            <div style="font-size:0.7rem; color:var(--dim);">Inclinación: <b id="d-inc" style="color:var(--text);">---</b></div>
            <div style="font-size:0.7rem; color:var(--dim);">Masa Gas: <b id="d-mgas" style="color:var(--text);">---</b></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
